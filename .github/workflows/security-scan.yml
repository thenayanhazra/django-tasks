name: Security scan

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  security:
    name: Dependency and static security checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project and security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pip-audit bandit

      - name: Audit Python dependencies
        run: pip-audit

      - name: Run Bandit scan
        run: bandit -q -r django_tasks
